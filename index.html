<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anthony Le Archive</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="#top" aria-label="Anthony Le Archive home">
      <span class="mark">AL</span>
      <span>
        <strong>Anthony Le Archive</strong>
        <small>145 photos</small>
      </span>
    </a>

    <nav aria-label="Site navigation">
      <a href="#gallery">Gallery</a>
      <a href="#about">About</a>
      <a href="#projects">Projects</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <main id="top">
    <section class="intro" id="gallery" aria-labelledby="page-title">
      <h1 id="page-title">Gallery</h1>
    </section>

    <section class="toolbar" aria-label="Gallery controls">
      <div>
        <p>Click any photo to open it larger.</p>
      </div>
      <button class="shuffle-button" type="button" id="shufflePhoto">Random photo</button>
    </section>

    <section class="gallery" id="photoGrid" aria-label="Photo gallery"></section>
  </main>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="close-button" type="button" id="closeLightbox" aria-label="Close photo">Close</button>
    <img id="lightboxImage" src="" alt="">
    <p id="lightboxCaption"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>

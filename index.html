<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anthony Le Archive</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #090909;
      --text: #f4f0e8;
      --muted: #9a968d;
      --line: #2a2925;
      --gold: #d7b85f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 28% 20%, rgba(215, 184, 95, 0.12), transparent 22rem),
        linear-gradient(180deg, #11110f 0%, var(--bg) 58%);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
    }

    main {
      width: min(100%, 620px);
      padding: 32px 22px;
    }

    .mark {
      width: 54px;
      height: 54px;
      margin: 0 auto 24px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      background: #151411;
      color: var(--gold);
      font-weight: 700;
      letter-spacing: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 8vw, 5.2rem);
      line-height: 0.94;
      letter-spacing: 0;
    }

    p {
      max-width: 440px;
      margin: 18px auto 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.55;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      min-height: 36px;
      margin-top: 28px;
      padding: 0 13px;
      border: 1px solid var(--line);
      color: #d8d3c8;
      background: rgba(20, 19, 16, 0.78);
      font-size: 0.86rem;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 18px rgba(215, 184, 95, 0.8);
    }
  </style>
</head>
<body>
  <main>
    <div class="mark">AL</div>
    <h1>Anthony Le Archive</h1>
    <p>This photo archive is currently being built. Check back soon.</p>
    <div class="status">
      <span class="dot"></span>
      under construction
    </div>
  </main>
</body>
</html>
